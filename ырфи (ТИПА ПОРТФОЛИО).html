<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Space</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafafa; color: #222; padding: 20px; }
        
        header { max-width: 900px; margin: 40px auto; display: flex; justify-content: space-between; align-items: center; }
        nav a { text-decoration: none; color: #888; font-size: 14px; margin-left: 15px; transition: 0.2s; }
        nav a:hover { color: #000; }

        main { max-width: 900px; margin: 0 auto; }
        
        .intro { padding: 60px 0; border-bottom: 1px solid #eee; }
        .intro h1 { font-size: 42px; line-height: 1.1; margin-bottom: 10px; }
        .intro p { font-size: 18px; color: #666; max-width: 500px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 50px; }
        .project-card { text-decoration: none; color: inherit; }
        .thumb { background: #eee; aspect-ratio: 16/9; border-radius: 8px; margin-bottom: 12px; transition: transform 0.3s; }
        .project-card:hover .thumb { transform: translateY(-5px); background: #e0e0e0; }
        .project-card h3 { font-size: 18px; margin-bottom: 5px; }
        .project-card p { font-size: 14px; color: #777; }
    </style>
</head>
<body>

    <header>
        <strong>KODOEV.DEV</strong>
        <nav>
            <a href="#">Проекты</a>
            <a href="#">Стек</a>
            <a href="#">Коннект</a>
        </nav>
    </header>

    <main>
        <section class="intro">
            <h1>Создаю цифровые штуки.</h1>
            <p>Будущий айтишник. Кожу на Python, верстаю интерфейсы, не люблю лишний пафос.</p>
        </section>

        <div class="grid">
            <a href="#" class="project-card">
                <div class="thumb"></div>
                <h3>Кодоев Храм</h3>
                <p>Главный проект всей жизни. Пока в разработке.</p>
            </a>
            <a href="#" class="project-card">
                <div class="thumb"></div>
                <h3>Python Скрипты</h3>
                <p>Автоматизация всего, что движется.</p>
            </a>
            <a href="#" class="project-card">
                <div class="thumb"></div>
                <h3>Веб-интерфейсы</h3>
                <p>Чистый HTML/CSS без мусора.</p>
            </a>
        </div>
    </main>

</body>
</html>
