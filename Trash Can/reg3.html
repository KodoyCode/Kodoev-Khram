<!DOCTYPE html>
<html lang="kaa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yep, another registration govno, again.</title>
    <style>
        /* Все стили теперь работают вместе, без войн */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f1115; /* Перекатился на элитную темную тему */
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background-color: #181c24;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
            border: 1px solid #2d3748;
        }

        h1 {
            font-size: 1.8rem;
            color: #00ff66; /* Фирменный зеленый KodoyCode */
            margin-bottom: 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group span {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #101216;
            border: 1px solid #4a5568;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #00ff66;
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.2);
        }

        select option {
            background: #181c24;
            color: #fff;
        }

        /* Если элемент disabled, он будет слегка прозрачным */
        select:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        button[type="submit"] {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            transition: background-color 0.2s, transform 0.1s;
        }

        button[type="submit"]:hover {
            background-color: #2ecc71;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Qaydǵa túsiriw</h1>

        <form action="#" method="post" onsubmit="alert('Данные улетели на сервера Протона!'); return false;">
            <div class="form-group">
                <span>Tolıq atıńız</span>
                <input type="text" name="fullName" placeholder="At hám familıya" required>
            </div>

            <div class="form-group">
                <span>Email mánzilińiz</span>
                <input type="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <span>Rayon</span>
                <select id="region" name="region" required>
                    <option value="" disabled selected hidden>Rayondı tańlań</option>
                    <option value="nokis">Nókis qalası</option>
                    <option value="amudarya">Ámıdárya</option>
                    <option value="beruniy">Berúniy</option>
                    <option value="shimbay">Shımbay</option>
                    <option value="ellikqala">Ellikqala</option>
                    <option value="kegeyli">Kegeyli</option>
                    <option value="konlirat">Qonlırat</option>
                    <option value="karaozek">Qaraózek</option>
                    <option value="xojeli">Xojeli</option>
                    <option value="konlikol">Qonlıkól</option>
                    <option value="mangit">Mańgıt</option>
                    <option value="muynaq">Muynaq</option>
                    <option value="taqiyatas">Taqıyatas</option>
                    <option value="turtqul">Túrtkúl</option>
                </select>
            </div>

            <div class="form-group">
                <span>Qala / Máhálle</span>
                <select id="city" name="city" required disabled>
                    <option value="" disabled selected hidden>Álǵash rayondı tańlań</option>
                </select>
            </div>

            <div class="form-group">
                <span>Jańa parol</span>
                <input type="password" name="password" placeholder="Parol" minlength="8" required>
            </div>

            <button type="submit">Akkaunt jaratıw</button>
        </form>
    </div>

    <script>
        // Твой JS-скрипт — идеален, оставляем без изменений
        const cities = {
            nokis: ['Nókis', 'Biruniy máhállesi', 'Doslıq máhállesi'],
            amudarya: ['Mangit', 'Xojeli', 'Burınbay'],
            beruniy: ['Berúniy', 'Qozılayıq', 'Qıpshaq'],
            shimbay: ['Shımbay', 'Qanlıkól', 'Qıpshaq'],
            ellikqala: ['Boǵaz', 'Qaraózek', 'Ellikqala'],
            kegeyli: ['Kegeyli', 'Sarıbay', 'Qongırat'],
            konlirat: ['Qonlırat', 'Jaslıq', 'Sarıbay'],
            karaozek: ['Qaraózek', 'Qıpshaq', 'Qongırat'],
            xojeli: ['Xojeli', 'Mangit', 'Burınbay'],
            konlikol: ['Qonlıkól', 'Shımbay', 'Qıpshaq'],
            mangit: ['Mańgıt', 'Xojeli', 'Burınbay'],
            muynaq: ['Muynaq', 'Qongırat', 'Qaraqalpaq'],
            taqiyatas: ['Taqıyatas', 'Qongırat', 'Qıpshaq'],
            turtqul: ['Túrtkúl', 'Qongırat', 'Sarıbay']
        };

        const regionSelect = document.getElementById('region');
        const citySelect = document.getElementById('city');

        regionSelect.addEventListener('change', function () {
            const region = this.value;
            citySelect.innerHTML = '<option value="" disabled selected hidden>Qalani tańlań</option>';

            if (region && cities[region]) {
                cities[region].forEach(function (city) {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
                citySelect.disabled = false;
            } else {
                citySelect.disabled = true;
            }
        });
    </script>
</body>
</html>
