<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            background: #ececec;
            color: #222;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        form {
            width: 100%;
            max-width: 360px;
            margin: 0;
            padding: 32px 24px;
            background: #fff;
            border: 1px solid #ddd;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 24px;
            font-weight: normal;
        }

        label {
            display: block;
            margin-bottom: 16px;
        }

        span {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            font-size: 1rem;
            background: #fff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            background: green;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <form action="#" method="post">
        <h1>Registrdan otiw</h1>

        <label>
            <span>Toliq atiniz</span>
            <input type="text" name="fullName" placeholder="At ham familiya" required>
        </label>

        <label>
            <span>Email manziliniz</span>
            <input type="email" name="email" placeholder="example@email.com" required>
        </label>

        <label>
            <span>Rayon</span>
            <select id="region" name="region" required>
                <option value="" disabled selected>Rayondi tanlan</option>
                <option value="nokis">Nokis qalasi</option>
                <option value="shimbay">Shimbay</option>
                <option value="xojeli">Xojeli</option>
                <option value="muynaq">Muynaq</option>
            </select>
        </label>

        <label>
            <span>Jana parol</span>
            <input type="password" name="password" placeholder="Parol" required>
        </label>

        <button type="submit">Akkaunt jaratiw</button>
    </form>
</body>
</html>
